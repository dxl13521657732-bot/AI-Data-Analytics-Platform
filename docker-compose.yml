version: "3.9"

services:
  backend:
    build: ./backend
    # 生产环境可改为: image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - sqlite_data:/app/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  sqlite_data:
    driver: local

networks:
  app-network:
    driver: bridge
