version: "3.9"

# 开发环境：后端热重载，前端通过 Vite dev server 运行
services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app        # 挂载代码目录实现热重载
      - sqlite_data:/app/data
    ports:
      - "8000:8000"           # 开发时直接暴露后端端口
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network

volumes:
  sqlite_data:
    driver: local

networks:
  app-network:
    driver: bridge
